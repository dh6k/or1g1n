enable-module-update = true
parallel-jobs = 1
remove-rv-integrations-checks = false

[Brave]
app-name = "Brave"
patches-source = "dh6k/morphe-patches"
additional-patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "or1g1n"
build-mode = "apk"
version = "latest"
included-patches = "'Brave Origin' 'Change app name'"
patcher-args = "-OappName=0r1g1n"
additional-included-patches = "'Change package name'"
exclusive-patches = true
additional-patcher-args = """\
  -OpackageName=vip.dh6k.brave.or1g1n \
  -OupdatePermissions=true \
  -OupdateProviders=true \
  """
pkg-name = "com.brave.browser"
arch = "arm64-v8a"
dpi = "nodpi"
direct-dlurl = "https://github.com/brave/brave-browser/releases/latest/download/BraveMonoarm64.apk?channel=release-android"

[Brave-Beta]
app-name = "Brave Beta"
patches-source = "dh6k/morphe-patches"
additional-patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "or1g1n"
build-mode = "apk"
version = "latest"
included-patches = "'Brave Origin' 'Change app name'"
patcher-args = "-OappName='0r1g1n beta'"
additional-included-patches = "'Change package name'"
exclusive-patches = true
additional-patcher-args = """\
  -OpackageName=vip.dh6k.brave.or1g1n.beta \
  -OupdatePermissions=true \
  -OupdateProviders=true \
  """
pkg-name = "com.brave.browser_beta"
arch = "arm64-v8a"
dpi = "nodpi"
direct-dlurl = "https://github.com/brave/brave-browser/releases/latest/download/BraveMonoarm64.apk?channel=beta-android"
